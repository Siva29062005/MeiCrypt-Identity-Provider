version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meicrypt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meicrypt_identity
      POSTGRES_USER: meicrypt
      POSTGRES_PASSWORD: meicrypt_dev_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meicrypt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meicrypt -d meicrypt_identity"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: meicrypt-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: meicrypt_identity_test
      POSTGRES_USER: meicrypt_test
      POSTGRES_PASSWORD: meicrypt_test_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    networks:
      - meicrypt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meicrypt_test -d meicrypt_identity_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meicrypt-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meicrypt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: meicrypt-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meicrypt.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - meicrypt-network
    depends_on:
      - postgres

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: meicrypt-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - meicrypt-network
    depends_on:
      - redis

networks:
  meicrypt-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
