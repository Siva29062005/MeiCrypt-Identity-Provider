spring:
  application:
    name: meicrypt-identity-platform
  
  profiles:
    active: local
  
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:8080

  session:
    store-type: redis

  data:
    redis:
      repositories:
        enabled: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.meicrypt: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  paths-to-match: /api/v1/**, /oauth2/**, /.well-known/**

# MeiCrypt platform-specific configuration (Phase 3 auth + Phase 7 OIDC)
# NOTE: `issuer` MUST be a full URL - it is advertised verbatim in the
# `iss` claim of every OAuth/OIDC JWT and in the OpenID Connect discovery
# document at /.well-known/openid-configuration.
meicrypt:
  auth:
    issuer: ${MEICRYPT_ISSUER:http://localhost:8080}
    # HS256 requires >= 32 bytes. Override in production via env var.
    secret: ${MEICRYPT_JWT_SECRET:change-me-change-me-change-me-change-me-change-me!!}
    access-token-ttl-seconds: 900         # 15 minutes
    refresh-token-ttl-seconds: 604800     # 7 days
    session-ttl-seconds: 28800            # 8 hours

  # Phase 9 - Multi-Factor Authentication
  mfa:
    issuer: ${MEICRYPT_MFA_ISSUER:MeiCrypt}
    relying-party-id: ${MEICRYPT_MFA_RP_ID:localhost}
    relying-party-name: ${MEICRYPT_MFA_RP_NAME:MeiCrypt Identity}
    relying-party-origin: ${MEICRYPT_MFA_RP_ORIGIN:http://localhost:8080}
    challenge-ttl-seconds: 300
    webauthn-challenge-ttl-seconds: 300
    totp-allowed-time-step-skew: 1
    max-challenge-attempts: 5

  # Phase 10 - Notification Delivery (async email / SMS outbox)
  notifications:
    batch-size: 20
    max-attempts: 5
    default-locale: en
    worker-enabled: true
    log-only-transport: true
    # Poll every 5 seconds. Bump up for production or lower during load tests.
    poll-interval-ms: 5000


---
# LOCAL DEVELOPMENT PROFILE
spring:
  config:
    activate:
      on-profile: local
  
  datasource:
    url: jdbc:postgresql://localhost:5432/meicrypt_identity
    username: meicrypt
    password: meicrypt_dev_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: MeiCryptHikariPool
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  jpa:
    # Disabled to keep the console readable while the Phase 10 outbox worker
    # polls the notifications table. Flip to true on-demand.
    show-sql: false

logging:
  level:
    com.meicrypt: DEBUG
    org.springframework.security: INFO
    # Hibernate SQL logging is *off* by default so the notification outbox
    # poller (Phase 10) does not spam the console every second.
    # Flip this to DEBUG when you need to inspect the actual JDBC statements.
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

---
# TEST PROFILE
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:postgresql://localhost:5432/meicrypt_identity_test
    username: meicrypt_test
    password: meicrypt_test_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      pool-name: MeiCryptTestHikariPool
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  
  jpa:
    show-sql: true

logging:
  level:
    root: INFO
    com.meicrypt: DEBUG

---
# PRODUCTION PROFILE
spring:
  config:
    activate:
      on-profile: production
  
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 120000
      pool-name: MeiCryptProductionHikariPool
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3000ms
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms

  security:
    oauth2:
      authorizationserver:
        issuer: ${ISSUER_URL}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-exception: false

logging:
  level:
    root: WARN
    com.meicrypt: INFO
    org.springframework.security: INFO
